server:
  port: 8083

spring:
  main:
    lazy-initialization: true
  config:
    activate:
      on-profile: desktop
  r2dbc:
    url: r2dbc:h2:file:///~/geo_bridge_storage/db/geo_bridge;MODE=MySQL;AUTO_SERVER=TRUE
    username: sa
    password: 
    pool:
      initial-size: 5
      max-size: 10
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always # 앱 실행 시마다 스크립트 체크
      schema-locations: classpath:db/h2/ddl.sql # 테이블 생성 스크립트 위치